name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pytest:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check web tests collectors core analysis
      - name: Compile (syntax check)
        run: python -m compileall -q web tests collectors core analysis
      - name: Bandit (security lint)
        run: bandit -r collectors core web -ll
      - name: Run pytest
        run: python -m pytest tests/ -q
