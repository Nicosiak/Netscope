target-version = "py311"
line-length = 120

[lint]
# F: pyflakes; E4/E7/E9: critical pycodestyle; I: isort (import order)
select = ["F", "E4", "E7", "E9", "I"]
ignore = [
  "E402",  # module import not at top — acceptable after sys.path tweaks in tests
]

[lint.isort]
known-first-party = ["analysis", "collectors", "core"]

[lint.per-file-ignores]
"tests/*" = []
